<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Dialog, Button, Tag } = window.WeftDesignSystem_9a241d;
  function Demo() {
    const [modal, setModal] = React.useState(true);
    const [panel, setPanel] = React.useState(false);
    return (
      <div className="bg">
        <div className="t-label">Overlays</div>
        <p>A centered modal sits over a flat dim backdrop; the panel slides in from the right edge. Esc or a backdrop click closes either.</p>
        <div className="controls">
          <Button variant="secondary" onClick={() => setModal(true)}>Open modal</Button>
          <Button variant="secondary" onClick={() => setPanel(true)}>Open panel</Button>
        </div>

        <Dialog
          open={modal}
          onClose={() => setModal(false)}
          title="Close all done issues?"
          footer={<>
            <Button variant="ghost" onClick={() => setModal(false)}>Cancel</Button>
            <Button variant="danger" onClick={() => setModal(false)}>Close all</Button>
          </>}
        >
          This archives 3 done issues from the board. context.md will regenerate on the next mutation.
        </Dialog>

        <Dialog variant="panel" open={panel} onClose={() => setPanel(false)} title="fg-da8d50" width={380}>
          <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
            <Tag tone="var(--status-wip)">fixing</Tag>
            <Tag tone="var(--sev-high)" variant="severity">P1</Tag>
          </div>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 10 }}>Dashboard split-brain on relocated db path</div>
          <p style={{ margin: 0 }}>When .filigree.conf relocates the db, the dashboard and CLI opened different paths — a split-brain view. Honour from_conf.</p>
        </Dialog>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
