<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-base); font-family: var(--font-mono); padding: 26px 32px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 6px; background: var(--surface-raised); border: 1px solid var(--border-default); border-radius: var(--radius); }
  .nm { font-size: 10px; letter-spacing: 0.06em; color: var(--text-secondary); }
  .grp { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Mark } = window.WeftDesignSystem_9a241d;
  const CELLS = [
    { name: 'foundryside', color: 'var(--accent)' },
    { name: 'weft', color: 'var(--text-primary)' },
    { name: 'loomweave', color: 'var(--thread-loomweave)' },
    { name: 'filigree', color: 'var(--thread-filigree)' },
    { name: 'wardline', color: 'var(--thread-wardline)' },
    { name: 'legis', color: 'var(--thread-legis)' },
    { name: 'charter', color: 'var(--thread-charter)' },
    { name: 'shuttle', color: 'var(--thread-shuttle)' },
    { name: 'lacuna', color: 'var(--lacuna-accent)' },
  ];
  function Demo() {
    return (
      <div>
        <p className="grp">Org · umbrella · members · roadmap · specimen</p>
        <div className="grid">
          {CELLS.map(c => (
            <div className="cell" key={c.name}>
              <Mark name={c.name} size={30} style={{ color: c.color }} />
              <span className="nm">{c.name}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
