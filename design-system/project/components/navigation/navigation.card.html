<!-- @dsCard group="Components" name="Tabs" subtitle="Accent/thread underline tabs and the dashboard's pill nav" viewport="700x190" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  body { background: var(--surface-base); font-family: var(--font-mono); padding: 26px 32px; display: flex; flex-direction: column; gap: 22px; }
  #root { display: contents; }
  .blk { display: flex; flex-direction: column; gap: 9px; }
  .lbl { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Tabs } = window.WeftDesignSystem_9a241d;
  function Demo() {
    const [a, setA] = React.useState('kanban');
    const [b, setB] = React.useState('structure');
    const [c, setC] = React.useState('kanban');
    return (
      <>
        <div className="blk">
          <span className="lbl">Underline</span>
          <Tabs value={a} onChange={setA} tabs={[
            { id: 'kanban', label: 'Kanban' },
            { id: 'ready', label: 'Ready', count: 8 },
            { id: 'graph', label: 'Graph' },
            { id: 'files', label: 'Files' },
          ]} />
        </div>
        <div className="blk">
          <span className="lbl">Underline · thread-colored (legis)</span>
          <Tabs value={b} onChange={setB} accent="var(--thread-legis)" tabs={['structure', 'governance', 'work']} />
        </div>
        <div className="blk">
          <span className="lbl">Pill nav</span>
          <Tabs variant="pill" value={c} onChange={setC} tabs={[
            { id: 'kanban', label: 'Kanban' },
            { id: 'ready', label: 'Ready' },
            { id: 'graph', label: 'Graph' },
            { id: 'insights', label: 'Insights' },
          ]} />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
