<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:28px 40px;display:flex;flex-direction:column;gap:11px}
.row{display:flex;align-items:center;gap:16px}
.bar{height:18px;background:var(--accent);border-radius:2px}
.nm{font-size:11px;color:var(--text-secondary);width:62px}.px{font-size:10.5px;color:var(--text-muted)}</style></head>
<body>
  <div class="row"><div class="nm">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="nm">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="nm">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px · default gap</div></div>
  <div class="row"><div class="nm">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px · card padding</div></div>
  <div class="row"><div class="nm">space-6</div><div class="bar" style="width:24px"></div><div class="px">24px · section</div></div>
  <div class="row"><div class="nm">space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="nm">space-12</div><div class="bar" style="width:48px"></div><div class="px">48px · page gutter</div></div>
</body></html>
