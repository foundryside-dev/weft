<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:38px 40px;display:flex;gap:34px;align-items:center;justify-content:center}
.sw{display:flex;flex-direction:column;gap:14px;align-items:center}
.box{width:130px;height:72px;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-secondary)}
.nm{font-size:10.5px;color:var(--text-muted);text-align:center}</style></head>
<body>
  <div class="sw"><div class="box">dropdown</div><div class="nm">shadow-pop<br>0 10 25 / .45</div></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-pop)">popover</div><div class="nm">shadow-pop<br>applied</div></div>
  <div class="sw"><div class="box" style="box-shadow:var(--shadow-modal)">modal</div><div class="nm">shadow-modal<br>0 20 50 / .55</div></div>
  <div class="sw"><div class="box" style="box-shadow:var(--glow-accent);border-color:var(--accent)">flash</div><div class="nm">glow-accent<br>change pulse</div></div>
</body></html>
