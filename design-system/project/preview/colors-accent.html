<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Colors — accent & borders" subtitle="Sky accent + border tokens" viewport="700x190" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px}
.row{display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:74px;border-radius:var(--radius)}
.nm{font-size:11px;color:var(--text-primary)}.hx{font-size:10.5px;color:var(--text-muted)}</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="nm">accent</div><div class="hx">#38BDF8</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="nm">accent-hover</div><div class="hx">#0EA5E9</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent-subtle);border:1px solid var(--accent)"></div><div class="nm">accent-subtle</div><div class="hx">12,74,110 / .2</div></div>
    <div class="sw"><div class="chip" style="background:var(--border-default)"></div><div class="nm">border-default</div><div class="hx">#1E3340</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-base);border:1px solid var(--border-strong)"></div><div class="nm">border-strong</div><div class="hx">#2A4454</div></div>
  </div>
</body></html>
