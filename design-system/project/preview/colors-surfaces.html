<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Colors — surfaces" subtitle="Dark teal surface ramp (canonical)" viewport="700x190" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px}
.row{display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:74px;border-radius:var(--radius);border:1px solid var(--border-default)}
.nm{font-size:11px;color:var(--text-primary)}.hx{font-size:10.5px;color:var(--text-muted)}</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--surface-base)"></div><div class="nm">surface-base</div><div class="hx">#0B1215</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-raised)"></div><div class="nm">surface-raised</div><div class="hx">#131E24</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-overlay)"></div><div class="nm">surface-overlay</div><div class="hx">#1A2B34</div></div>
    <div class="sw"><div class="chip" style="background:var(--surface-hover)"></div><div class="nm">surface-hover</div><div class="hx">#243A45</div></div>
    <div class="sw"><div class="chip" style="background:var(--border-strong)"></div><div class="nm">border-strong</div><div class="hx">#2A4454</div></div>
  </div>
</body></html>
