<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Type — brand pairing" subtitle="Space Grotesk (brand) + JetBrains Mono (product)" viewport="700x240" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 40px;display:flex;gap:36px}
.col{flex:1}
.big{font-family:var(--font-display);font-weight:700;font-size:40px;letter-spacing:-0.02em;color:var(--text-primary);line-height:1}
.aa{font-family:var(--font-display);font-size:13px;color:var(--text-secondary);margin-top:14px;letter-spacing:0.02em}
.nm{font-size:12px;color:var(--text-primary);margin-top:18px}
.role{font-size:10.5px;color:var(--text-muted);margin-top:3px;line-height:1.5}
.mono{font-family:var(--font-mono);font-weight:600;font-size:34px;color:var(--text-primary);line-height:1}
.mm{font-family:var(--font-mono);font-size:12.5px;color:var(--text-secondary);margin-top:14px;line-height:1.6}
.rule{width:1px;background:var(--border-default)}</style></head>
<body>
  <div class="col">
    <div class="big">Weft</div>
    <div class="aa">AaBbCcGg 0123 — woven</div>
    <div class="nm">Space Grotesk · Brand</div>
    <div class="role">Wordmark, hub headlines, slide<br>titles. 700 / 600. OFL, open source.</div>
  </div>
  <div class="rule"></div>
  <div class="col">
    <div class="mono">filigree</div>
    <div class="mm">AaBbCcGg 0123 →<br>$ scan . --fail-on ERROR</div>
    <div class="nm">JetBrains Mono · Product</div>
    <div class="role">All UI, code, body, data.<br>400/500/600/700. OFL, open source.</div>
  </div>
</body></html>
