<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Pills & badges" subtitle="Status pills, type chips, severity, indicators" viewport="700x290" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:28px 36px;display:flex;flex-direction:column;gap:18px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);width:86px}
.pill{font-size:11px;font-weight:600;border-radius:var(--radius);padding:3px 9px}
.chip{font-size:11px;border-radius:var(--radius-sm);padding:2px 7px;background:var(--surface-overlay);color:var(--text-secondary)}
.dot{width:9px;height:9px;border-radius:var(--radius-full);display:inline-block}
.sev{font-size:10.5px;font-weight:600;border-radius:var(--radius-sm);padding:2px 8px;border:1px solid}</style></head>
<body>
  <div class="row"><span class="lbl">Status pill</span>
    <span class="pill" style="background:var(--accent);color:var(--text-on-accent)">Open</span>
    <span class="pill" style="background:var(--accent);color:var(--text-on-accent)">Active</span>
    <span class="pill" style="background:var(--surface-overlay);color:var(--text-secondary);border:1px solid var(--border-strong)">Done</span>
  </div>
  <div class="row"><span class="lbl">Inline status</span>
    <span class="chip" style="background:#56B7E233;color:#56B7E2">in_progress</span>
    <span class="chip" style="background:#64748B33;color:#94A3B8">triage</span>
    <span class="chip" style="background:#10B98133;color:#34D399">verifying</span>
  </div>
  <div class="row"><span class="lbl">Type chip</span>
    <span class="chip">&#128027; bug</span><span class="chip">&#10024; feature</span><span class="chip">&#128203; task</span><span class="chip">&#128202; epic</span>
  </div>
  <div class="row"><span class="lbl">Severity</span>
    <span class="sev" style="color:#F87171;border-color:#7F1D1D;background:rgba(127,29,29,.4)">critical</span>
    <span class="sev" style="color:#FB923C;border-color:#9A3412;background:rgba(124,45,18,.4)">high</span>
    <span class="sev" style="color:#FACC15;border-color:#854D0E;background:rgba(113,63,18,.4)">medium</span>
    <span class="sev" style="color:#60A5FA;border-color:#1E40AF;background:rgba(30,58,138,.4)">low</span>
  </div>
  <div class="row"><span class="lbl">Indicators</span>
    <span class="dot" style="background:var(--prio-0)"></span><span class="chip" style="background:none">P0 dot</span>
    <span style="color:#F87171;font-size:11px">&#128279; blocked by 2</span>
    <span style="color:#E9B04A;font-size:11px">&#9889;5 blocks</span>
    <span style="color:var(--text-secondary);font-size:11px">&#128100; agent-3</span>
  </div>
</body></html>
