<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Colors — text" subtitle="Primary / secondary / muted" viewport="700x230" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px;display:flex;flex-direction:column;gap:18px}
.row{display:flex;align-items:center;gap:16px}
.sw{width:48px;height:48px;border-radius:var(--radius);border:1px solid var(--border-default);flex:0 0 auto}
.sample{font-size:18px;flex:1}.nm{font-size:11.5px;color:var(--text-secondary)}.hx{font-size:10.5px;color:var(--text-muted);width:90px;text-align:right}</style></head>
<body>
  <div class="row"><div class="sw" style="background:#E2EEF2"></div><div class="sample" style="color:var(--text-primary)">Primary — headings, key values</div><div class="nm">text-primary</div><div class="hx">#E2EEF2</div></div>
  <div class="row"><div class="sw" style="background:#8FAAB8"></div><div class="sample" style="color:var(--text-secondary)">Secondary — body and labels</div><div class="nm">text-secondary</div><div class="hx">#8FAAB8</div></div>
  <div class="row"><div class="sw" style="background:#5A7D8C"></div><div class="sample" style="color:var(--text-muted)">Muted — metadata, hints</div><div class="nm">text-muted</div><div class="hx">#5A7D8C</div></div>
</body></html>
