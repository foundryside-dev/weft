<!-- @dsCard group="Brand" name="Light theme — Specimen (parity)" subtitle="Every token has a warm-paper light value: the same components, both themes" viewport="760x470" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--font-mono); display: grid; grid-template-columns: 1fr 1fr; }
  #root { display: contents; }
  .pane { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; background: var(--surface-base); min-height: 470px; box-sizing: border-box; }
  .pane .cap { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .pane .grp { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Tag, Tabs, Toast, IssueCard } = window.WeftDesignSystem_9a241d;
  function Cluster({ caption }) {
    const [tab, setTab] = React.useState('kanban');
    return (
      <div className="pane">
        <span className="cap">{caption}</span>
        <Tabs value={tab} onChange={setTab} tabs={[{ id: 'kanban', label: 'Kanban' }, { id: 'ready', label: 'Ready', count: 8 }, { id: 'graph', label: 'Graph' }]} />
        <div className="grp">
          <Button variant="primary" size="sm">+ New</Button>
          <Button variant="secondary" size="sm">Filters</Button>
          <Button variant="danger" size="sm">Close all</Button>
        </div>
        <div className="grp">
          <Badge>Open</Badge>
          <Tag tone="var(--status-wip)">in_progress</Tag>
          <Tag tone="var(--sev-critical)" variant="severity">critical</Tag>
          <Tag tone="var(--thread-legis)">legis</Tag>
        </div>
        <IssueCard issue={{ id: 'fg-7f3a', type: 'feature', priority: 0, title: 'SEI backfill: locator → stable identity', status: 'building', cat: 'wip', assignee: 'agent-3', ageH: 2, ready: true, impact: 5 }} />
        <Toast tone="var(--ready)" icon="●" title="Issue advanced">fg-7f3a → building</Toast>
      </div>
    );
  }
  function Demo() {
    return (
      <>
        <Cluster caption="Dark · canonical (Loom)" />
        <div data-theme="light" style={{ display: 'contents' }}>
          <Cluster caption="Light · Specimen (warm paper)" />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
