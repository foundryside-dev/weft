<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-base);font-family:var(--font-mono);padding:42px 46px;display:flex;flex-direction:column;gap:34px}
  .lockup{display:flex;align-items:center;gap:18px}
  .lockup .mk{width:50px;height:50px;color:var(--accent)}
  .word{font-family:var(--font-display);font-size:44px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary)}
  .tag{font-size:12px;color:var(--text-muted);letter-spacing:0.04em;margin-top:5px}
  .rule{width:1px;align-self:stretch;background:var(--border-strong);margin:2px 0}
  .row{display:flex;align-items:center;gap:34px}
  .alt{display:flex;align-items:center;gap:11px}
  .alt .mk{width:26px;height:26px;color:var(--text-primary)}
  .alt .w{font-family:var(--font-display);font-size:23px;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em}
  .chip{display:inline-flex;align-items:center;gap:9px;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius);padding:8px 13px}
  .chip .mk{width:20px;height:20px;color:var(--accent)}
  .chip span{font-size:14px;font-weight:500;color:var(--text-primary)}
  .mono .mk{width:26px;height:26px;color:var(--text-muted)}
</style></head>
<body>
  <div class="lockup">
    <svg class="mk" viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M11 6 V18.8"/><path d="M11 23.2 V26"/><path d="M21 6 V8.8"/><path d="M21 13.2 V26"/><path d="M6 11 H8.8"/><path d="M13.2 11 H26"/><path d="M6 21 H18.8"/><path d="M23.2 21 H26"/></g></svg>
    <div>
      <div class="word">Weft</div>
      <div class="tag">an agent-first federation of developer tools</div>
    </div>
  </div>
  <div class="row">
    <div class="alt"><svg class="mk" viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M11 6 V18.8"/><path d="M11 23.2 V26"/><path d="M21 6 V8.8"/><path d="M21 13.2 V26"/><path d="M6 11 H8.8"/><path d="M13.2 11 H26"/><path d="M6 21 H18.8"/><path d="M23.2 21 H26"/></g></svg><span class="w">Weft</span></div>
    <div class="rule"></div>
    <div class="alt mono"><svg class="mk" viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M11 6 V18.8"/><path d="M11 23.2 V26"/><path d="M21 6 V8.8"/><path d="M21 13.2 V26"/><path d="M6 11 H8.8"/><path d="M13.2 11 H26"/><path d="M6 21 H18.8"/><path d="M23.2 21 H26"/></g></svg><span class="w" style="color:var(--text-muted)">Weft</span></div>
    <div class="chip"><svg class="mk" viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M11 6 V18.8"/><path d="M11 23.2 V26"/><path d="M21 6 V8.8"/><path d="M21 13.2 V26"/><path d="M6 11 H8.8"/><path d="M13.2 11 H26"/><path d="M6 21 H18.8"/><path d="M23.2 21 H26"/></g></svg><span>~/weft</span></div>
  </div>
</body></html>
