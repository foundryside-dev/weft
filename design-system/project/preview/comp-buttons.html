<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Buttons" subtitle="Primary, secondary, ghost, status" viewport="700x250" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px;display:flex;flex-direction:column;gap:20px}
.row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
button{font-family:var(--font-mono);font-size:12px;font-weight:500;border-radius:var(--radius);padding:7px 12px;cursor:pointer;border:1px solid transparent;min-height:34px;transition:all var(--dur-fast) var(--ease)}
.primary{background:var(--accent);color:#06222F;border-color:var(--accent)}
.primary:hover{background:var(--accent-hover)}
.secondary{background:var(--surface-overlay);color:var(--text-secondary);border-color:var(--border-strong)}
.secondary:hover{background:var(--surface-hover);color:var(--text-primary)}
.ghost{background:transparent;color:var(--text-secondary)}
.ghost:hover{background:var(--surface-overlay);color:var(--text-primary)}
.danger{background:rgba(127,29,29,.5);color:#F87171;border-color:#7F1D1D}
.danger:hover{background:rgba(127,29,29,.85)}
.ready{background:rgba(6,78,59,.5);color:#34D399;border-color:#047857}
.lbl{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);width:78px}</style></head>
<body>
  <div class="row"><span class="lbl">Primary</span><button class="primary">+ New issue</button><button class="primary">Save preset</button><button class="primary" style="opacity:.6;pointer-events:none">Loading…</button></div>
  <div class="row"><span class="lbl">Secondary</span><button class="secondary">Filters</button><button class="secondary">&#9745; Select</button><button class="secondary">&#9881; Settings</button></div>
  <div class="row"><span class="lbl">Ghost / Nav</span><button class="ghost">Kanban</button><button class="ghost">Graph</button><button class="ghost">Files</button></div>
  <div class="row"><span class="lbl">Status</span><button class="ready">&#9679; Ready (12)</button><button class="danger">Close all</button></div>
</body></html>
