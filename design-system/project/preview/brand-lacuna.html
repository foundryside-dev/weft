<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Lacuna — specimen scheme" subtitle="Adjacent, not a member: off-palette magenta, dashed frame, warm surface" viewport="700x200" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:26px 32px;display:flex;flex-direction:column;gap:18px}
.top{display:flex;gap:24px;align-items:flex-start}
.id{display:flex;align-items:center;gap:13px;flex:0 0 auto}
.id svg{width:34px;height:34px;color:var(--lacuna-accent)}
.nm{font-size:16px;font-weight:600;color:var(--text-primary)}
.sub{font-size:10.5px;color:var(--lacuna-accent-dim);margin-top:2px;letter-spacing:0.03em}
.sw{display:flex;gap:9px;flex:1;flex-wrap:wrap}
.s{display:flex;flex-direction:column;gap:5px}
.box{width:60px;height:34px;border-radius:var(--radius)}
.sn{font-size:9px;color:var(--text-muted)}
.cmp{display:flex;gap:14px}
.mcard{flex:1;background:var(--surface-raised);border:1px solid var(--border-default);border-left:3px solid var(--thread-loomweave);border-radius:var(--radius);padding:11px 13px}
.lcard{flex:1;background:var(--lacuna-surface);border:1.5px dashed var(--lacuna-border);border-radius:var(--radius);padding:11px 13px}
.ct{font-size:12px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.ct svg{width:16px;height:16px}
.cm{font-size:10px;color:var(--text-muted);margin-top:5px}
.flaw{font-size:10.5px;color:var(--lacuna-flaw);margin-top:6px}
.tag{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;padding:1px 6px;border-radius:var(--radius-sm)}</style></head>
<body>
  <div class="top">
    <div class="id">
      <svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6 H25 A1 1 0 0 1 26 7 V25 A1 1 0 0 1 25 26 H7 A1 1 0 0 1 6 25 V7 A1 1 0 0 1 7 6 H13" stroke-dasharray="2.6 3"/></g><rect x="13.4" y="13.4" width="5.2" height="5.2" rx="1" fill="currentColor"/></svg>
      <div><div class="nm">Lacuna</div><div class="sub">demonstration specimen · not a member</div></div>
    </div>
    <div class="sw">
      <div class="s"><div class="box" style="background:var(--lacuna-accent)"></div><div class="sn">accent #CE7AAE</div></div>
      <div class="s"><div class="box" style="background:var(--lacuna-accent-dim)"></div><div class="sn">dim #8E5A77</div></div>
      <div class="s"><div class="box" style="background:var(--lacuna-surface);border:1px solid var(--lacuna-border)"></div><div class="sn">surface #1A1822</div></div>
      <div class="s"><div class="box" style="background:var(--lacuna-flaw)"></div><div class="sn">flaw #EF4444</div></div>
    </div>
  </div>
  <div class="cmp">
    <div class="mcard">
      <div class="ct"><span style="color:var(--thread-loomweave)">a Weft member</span><span class="tag" style="background:#4ECDC433;color:var(--thread-loomweave)">woven in</span></div>
      <div class="cm">solid left-rule · teal surface · thread color</div>
    </div>
    <div class="lcard">
      <div class="ct"><svg viewBox="0 0 32 32" fill="none" style="color:var(--lacuna-accent)"><g stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 6 H25 A1 1 0 0 1 26 7 V25 A1 1 0 0 1 25 26 H7 A1 1 0 0 1 6 25 V7 A1 1 0 0 1 7 6 H13" stroke-dasharray="2.6 3"/></g><rect x="13.4" y="13.4" width="5.2" height="5.2" rx="1" fill="currentColor"/></svg><span style="color:var(--lacuna-accent)">the specimen</span><span class="tag" style="background:#CE7AAE22;color:var(--lacuna-accent)">not part of</span></div>
      <div class="cm">dashed frame · warm-neutral surface · off-palette magenta</div>
      <div class="flaw">● planted lacuna PY-WL-101 — do not "fix"</div>
    </div>
  </div>
</body></html>
