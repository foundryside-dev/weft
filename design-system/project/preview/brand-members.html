<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Federation marks" subtitle="Six member glyphs, each in its thread color" viewport="700x210" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-base);font-family:var(--font-mono);padding:34px 40px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .cell{display:flex;align-items:center;gap:13px;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius);padding:14px 15px;border-left:3px solid var(--thread)}
  .cell svg{width:30px;height:30px;color:var(--thread);flex:0 0 auto}
  .nm{font-size:14px;font-weight:600;color:var(--text-primary)}
  .dm{font-size:10.5px;color:var(--text-muted);margin-top:2px;letter-spacing:0.02em}
</style></head>
<body>
  <div class="grid">
    <div class="cell thread-loomweave"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5 V27"/><path d="M16 11 H24"/><path d="M16 21 H8"/></g><g fill="currentColor"><circle cx="16" cy="5" r="2.4"/><circle cx="24" cy="11" r="2.4"/><circle cx="8" cy="21" r="2.4"/><circle cx="16" cy="27" r="2.4"/></g></svg><div><div class="nm">Loomweave</div><div class="dm">structure · identity (SEI)</div></div></div>
    <div class="cell thread-filigree"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M16 4 L28 16 L16 28 L4 16 Z"/><path d="M16 11 L21 16 L16 21 L11 16 Z" fill="currentColor" stroke="none"/></g></svg><div><div class="nm">Filigree</div><div class="dm">work state · issues</div></div></div>
    <div class="cell thread-wardline"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4 V28"/><path d="M6 10 H15"/><path d="M6 16 H15"/><path d="M6 22 H15"/><path d="M18 16 L26 11 V21 L18 16Z" fill="currentColor"/></g></svg><div><div class="nm">Wardline</div><div class="dm">trust boundaries</div></div></div>
    <div class="cell thread-legis"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 6 V25"/><path d="M9 25 H23"/><path d="M7 9 H25"/><path d="M7 9 L4 16 H10 L7 9Z"/><path d="M25 9 L22 16 H28 L25 9Z"/></g></svg><div><div class="nm">Legis</div><div class="dm">git/CI governance</div></div></div>
    <div class="cell thread-charter"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5 H24 V27 H8 Z"/><path d="M12 11 H20"/><path d="M12 16 H17"/><path d="M11.5 21.5 L14 24 L20 17.5"/></g></svg><div><div class="nm">Charter</div><div class="dm">requirements · verify</div></div></div>
    <div class="cell thread-shuttle"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 16 H28" stroke-dasharray="3 3.5"/><path d="M11 16 C11 12, 21 12, 21 16 C21 20, 11 20, 11 16 Z"/><circle cx="16" cy="16" r="1.6" fill="currentColor" stroke="none"/></g></svg><div><div class="nm">Shuttle</div><div class="dm">roadmap · not built</div></div></div>
  </div>
</body></html>
