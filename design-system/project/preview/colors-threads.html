<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px}
.row{display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:80px;border-radius:var(--radius);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box}
.chip span{font-size:10px;color:rgba(0,0,0,.55);font-weight:600}
.nm{font-size:11px;color:var(--text-primary)}.hx{font-size:10.5px;color:var(--text-muted)}</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--thread-clarion)"></div><div class="nm">Clarion</div><div class="hx">#4ECDC4 aqua</div></div>
    <div class="sw"><div class="chip" style="background:var(--thread-filigree)"></div><div class="nm">Filigree</div><div class="hx">#38BDF8 sky</div></div>
    <div class="sw"><div class="chip" style="background:var(--thread-wardline)"></div><div class="nm">Wardline</div><div class="hx">#F4845F coral</div></div>
    <div class="sw"><div class="chip" style="background:var(--thread-legis)"></div><div class="nm">Legis</div><div class="hx">#A78BFA violet</div></div>
    <div class="sw"><div class="chip" style="background:var(--thread-charter)"></div><div class="nm">Charter</div><div class="hx">#E3B341 gold</div></div>
    <div class="sw"><div class="chip" style="background:var(--thread-shuttle)"></div><div class="nm">Shuttle</div><div class="hx">#6B7C8C slate</div></div>
  </div>
</body></html>
