<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:24px 32px}
.dossier{background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden}
.head{padding:13px 16px;border-bottom:1px solid var(--border-default);display:flex;align-items:center;gap:10px}
.ent{font-size:13px;color:var(--text-primary);font-weight:600}
.sei{font-size:10.5px;color:var(--text-muted);background:var(--surface-overlay);padding:2px 7px;border-radius:var(--radius-sm)}
.fresh{margin-left:auto;font-size:10px;color:var(--ready)}
.fact{display:flex;align-items:center;gap:11px;padding:10px 16px;border-bottom:1px solid var(--border-default)}
.fact:last-child{border-bottom:none}
.fact svg{width:18px;height:18px;color:var(--thread);flex:0 0 auto}
.src{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--thread);width:78px;flex:0 0 auto}
.val{font-size:12px;color:var(--text-secondary);flex:1}
.val b{color:var(--text-primary);font-weight:500}</style></head>
<body>
  <div class="dossier">
    <div class="head"><span style="color:var(--text-muted)">&#9670;</span><span class="ent">auth.session.build_record</span><span class="sei">sei:7f3a…b1</span><span class="fresh">&#9679; fresh</span></div>
    <div class="fact thread-loomweave"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5 V27"/><path d="M16 11 H24"/><path d="M16 21 H8"/></g><g fill="currentColor"><circle cx="16" cy="5" r="3"/><circle cx="24" cy="11" r="3"/><circle cx="8" cy="21" r="3"/><circle cx="16" cy="27" r="3"/></g></svg><span class="src">Loomweave</span><span class="val">function · <b>14 callers</b> · 2 subsystems</span></div>
    <div class="fact thread-wardline"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4 V28"/><path d="M6 10 H15"/><path d="M6 16 H15"/><path d="M6 22 H15"/><path d="M18 16 L26 11 V21 L18 16Z" fill="currentColor"/></g></svg><span class="src">Wardline</span><span class="val">taint <b style="color:var(--stale)">EXTERNAL_RAW</b> reaches ASSURED producer</span></div>
    <div class="fact thread-legis"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 6 V25"/><path d="M9 25 H23"/><path d="M7 9 H25"/><path d="M7 9 L4 16 H10 L7 9Z"/><path d="M25 9 L22 16 H28 L25 9Z"/></g></svg><span class="src">Legis</span><span class="val">override <b>recorded</b> · awaiting async review</span></div>
    <div class="fact thread-filigree"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"><path d="M16 4 L28 16 L16 28 L4 16 Z"/><path d="M16 11 L21 16 L16 21 L11 16 Z" fill="currentColor" stroke="none"/></g></svg><span class="src">Filigree</span><span class="val">issue <b>fg-da8d</b> · fixing · P1</span></div>
    <div class="fact thread-charter"><svg viewBox="0 0 32 32" fill="none"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5 H24 V27 H8 Z"/><path d="M12 11 H20"/><path d="M12 16 H17"/><path d="M11.5 21.5 L14 24 L20 17.5"/></g></svg><span class="src">Charter</span><span class="val">obligation <b>REQ-204</b> · verification pending</span></div>
  </div>
</body></html>
