<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — priority & severity" subtitle="P0–P4 ramp + finding severity" viewport="700x260" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:28px 36px;display:flex;flex-direction:column;gap:22px}
.lbl{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted)}
.ramp{display:flex;gap:10px;margin-top:10px}
.sw{flex:1;display:flex;flex-direction:column;gap:6px}
.chip{height:42px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(0,0,0,.55)}
.nm{font-size:10px;color:var(--text-secondary)}.hx{font-size:9.5px;color:var(--text-muted)}</style></head>
<body>
  <div>
    <div class="lbl">Priority ramp · P0 → P4</div>
    <div class="ramp">
      <div class="sw"><div class="chip" style="background:var(--prio-0)">P0</div><div class="nm">critical</div><div class="hx">#E25C49</div></div>
      <div class="sw"><div class="chip" style="background:var(--prio-1)">P1</div><div class="nm">high</div><div class="hx">#EC8A3C</div></div>
      <div class="sw"><div class="chip" style="background:var(--prio-2)">P2</div><div class="nm">medium</div><div class="hx">#8A7A64</div></div>
      <div class="sw"><div class="chip" style="background:var(--prio-3)">P3</div><div class="nm">low</div><div class="hx">#C9BBA0</div></div>
      <div class="sw"><div class="chip" style="background:var(--prio-4)">P4</div><div class="nm">backlog</div><div class="hx">#C9BBA0</div></div>
    </div>
  </div>
  <div>
    <div class="lbl">Finding severity</div>
    <div class="ramp">
      <div class="sw"><div class="chip" style="background:var(--sev-critical)">CRIT</div><div class="nm">critical</div><div class="hx">#E25C49</div></div>
      <div class="sw"><div class="chip" style="background:var(--sev-high)">HIGH</div><div class="nm">high</div><div class="hx">#EC8A3C</div></div>
      <div class="sw"><div class="chip" style="background:var(--sev-medium)">MED</div><div class="nm">medium</div><div class="hx">#E0B23A</div></div>
      <div class="sw"><div class="chip" style="background:var(--sev-low)">LOW</div><div class="nm">low</div><div class="hx">#56A0E2</div></div>
      <div class="sw"><div class="chip" style="background:var(--sev-info)">INFO</div><div class="nm">info</div><div class="hx">#8A7A64</div></div>
    </div>
  </div>
</body></html>
