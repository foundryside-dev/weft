<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:26px 36px;display:flex;flex-direction:column;gap:12px}
.card{position:relative;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius);padding:12px 12px 12px 18px;transition:background var(--dur-fast) var(--ease)}
.card:hover{background:var(--surface-hover)}
.rule{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.ready{border-left:4px solid var(--ready)}
.aging{border-left:4px solid var(--aging)}
.t1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.title{font-weight:600;color:var(--text-primary);font-size:13px;flex:1}
.dot{width:8px;height:8px;border-radius:var(--radius-full)}
.p0{font-size:11px;font-weight:700}
.t2{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);flex-wrap:wrap}
.id{background:var(--surface-overlay);color:var(--text-primary);padding:1px 6px;border-radius:var(--radius-sm)}
.tag{background:var(--surface-overlay);color:var(--text-secondary);padding:1px 6px;border-radius:var(--radius-sm)}</style></head>
<body>
  <div class="card ready">
    <div class="t1"><span>&#10024;</span><span class="p0" style="color:var(--prio-0)">P0</span><span class="title">SEI backfill: locator → stable identity</span></div>
    <div class="t2"><span class="id">fg-7f3a</span><span class="tag">feature</span><span class="tag" style="background:#38BDF833;color:#38BDF8">building</span><span style="color:#FBBF24">&#9889;5</span><span style="color:var(--text-secondary)">&#128100; agent-3</span></div>
  </div>
  <div class="card aging">
    <div class="rule" style="background:var(--prio-2)"></div>
    <div class="t1"><span>&#128027;</span><span class="dot" style="background:var(--prio-2)"></span><span class="title">Dashboard split-brain on relocated db path</span></div>
    <div class="t2"><span class="id">fg-da8d</span><span class="tag">bug</span><span class="tag" style="background:#64748B33;color:#94A3B8">fixing</span><span style="color:#F87171">&#128279; blocked by 1</span><span style="color:var(--aging)">6h</span></div>
  </div>
  <div class="card">
    <div class="rule" style="background:var(--thread-charter)"></div>
    <div class="t1"><span>&#128203;</span><span class="dot" style="background:var(--prio-3)"></span><span class="title">Write federation contract index pointer doc</span></div>
    <div class="t2"><span class="id">fg-1c40</span><span class="tag">task</span><span class="tag" style="background:#64748B33;color:#94A3B8">open</span></div>
  </div>
</body></html>
