<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Weft">
  <!-- DIRECTION C — "the crossing" (compact / favicon lockup)
       The irreducible unit of weaving: one weft over one warp, under
       the next. The atomic honest join between two members. Holds at
       16px. Pairs with A as the small-size mark. -->

  <!-- warp the weft crosses IN FRONT of -->
  <line x1="11" y1="5" x2="11" y2="27" stroke="#C2B69E" stroke-width="3.2" stroke-linecap="round"/>
  <!-- the weft -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#35487B" stroke-width="3.2" stroke-linecap="round"/>
  <!-- warp the weft crosses BEHIND (drawn last) -->
  <line x1="21" y1="5" x2="21" y2="27" stroke="#C2B69E" stroke-width="3.2" stroke-linecap="round"/>
</svg>
