<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Colors — thread palette" subtitle="One thread per federation member (warmed for Loom)" viewport="700x200" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--surface-base);font-family:var(--font-mono);padding:30px 36px}
.row{display:flex;gap:14px}
.sw{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{height:80px;border-radius:var(--radius);display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;box-shadow:var(--glow-thread)}
.chip span{font-size:10px;color:rgba(0,0,0,.55);font-weight:600}
.nm{font-size:11px;color:var(--text-primary)}.hx{font-size:10.5px;color:var(--text-muted)}</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip thread-loomweave" style="background:var(--thread-loomweave)"></div><div class="nm">Loomweave</div><div class="hx">#52C9B8 aqua</div></div>
    <div class="sw"><div class="chip thread-filigree" style="background:var(--thread-filigree)"></div><div class="nm">Filigree</div><div class="hx">#56B7E2 sky</div></div>
    <div class="sw"><div class="chip thread-wardline" style="background:var(--thread-wardline)"></div><div class="nm">Wardline</div><div class="hx">#F0875E coral</div></div>
    <div class="sw"><div class="chip thread-legis" style="background:var(--thread-legis)"></div><div class="nm">Legis</div><div class="hx">#B79BF2 violet</div></div>
    <div class="sw"><div class="chip thread-charter" style="background:var(--thread-charter)"></div><div class="nm">Charter</div><div class="hx">#E9B04A gold</div></div>
    <div class="sw"><div class="chip thread-shuttle" style="background:var(--thread-shuttle)"></div><div class="nm">Shuttle</div><div class="hx">#8C7C68 slate</div></div>
  </div>
</body></html>
