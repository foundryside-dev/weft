<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Foundryside — org mark" subtitle="The parent org (foundryside.dev) that holds the Weft federation" viewport="700x230" -->
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--surface-base);font-family:var(--font-mono);padding:34px 40px;display:flex;flex-direction:column;gap:26px}
  .lockup{display:flex;align-items:center;gap:18px}
  .lockup .mk{width:46px;height:46px;color:var(--text-primary);flex:0 0 auto}
  .word{font-family:var(--font-display);font-size:38px;font-weight:700;letter-spacing:-0.02em;color:var(--text-primary)}
  .tag{font-size:12px;color:var(--text-muted);letter-spacing:0.03em;margin-top:4px}
  .tag b{color:var(--accent);font-weight:500}
  .hier{display:flex;align-items:center;gap:11px;flex-wrap:wrap}
  .node{display:inline-flex;align-items:center;gap:9px;background:var(--surface-raised);border:1px solid var(--border-default);border-radius:var(--radius);padding:8px 13px}
  .node.org{border-left:3px solid var(--text-primary)}
  .node.fed{border-left:3px solid var(--accent)}
  .node .mk{width:19px;height:19px;flex:0 0 auto}
  .node .lab{font-size:13px;font-weight:500;color:var(--text-primary)}
  .node .role{font-size:10px;color:var(--text-muted);margin-left:2px}
  .arrow{color:var(--text-muted);font-size:13px}
  .members{display:flex;align-items:center;gap:7px}
  .members .role{margin-left:5px}
  .members svg{width:21px;height:21px}
</style></head>
<body>
  <div class="lockup">
    <svg class="mk" viewBox="0 0 32 32" fill="none">
      <g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 24 H27"/><path d="M11 24 V15"/><path d="M16 24 V10"/><path d="M21 24 V15"/></g>
      <g fill="currentColor"><circle cx="11" cy="15" r="2.1"/><circle cx="16" cy="10" r="2.3"/><circle cx="21" cy="15" r="2.1"/></g>
    </svg>
    <div>
      <div class="word">Foundryside</div>
      <div class="tag">the GitHub org that forges &amp; holds the federation · <b>foundryside.dev</b></div>
    </div>
  </div>

  <div class="hier">
    <div class="node org">
      <svg class="mk" viewBox="0 0 32 32" fill="none" style="color:var(--text-primary)"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 24 H27"/><path d="M11 24 V15"/><path d="M16 24 V10"/><path d="M21 24 V15"/></g><g fill="currentColor"><circle cx="11" cy="15" r="2.1"/><circle cx="16" cy="10" r="2.3"/><circle cx="21" cy="15" r="2.1"/></g></svg>
      <span class="lab">Foundryside</span><span class="role">org</span>
    </div>
    <span class="arrow">▸</span>
    <div class="node fed">
      <svg class="mk" viewBox="0 0 32 32" fill="none" style="color:var(--accent)"><g stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M11 6 V18.8"/><path d="M11 23.2 V26"/><path d="M21 6 V8.8"/><path d="M21 13.2 V26"/><path d="M6 11 H8.8"/><path d="M13.2 11 H26"/><path d="M6 21 H18.8"/><path d="M23.2 21 H26"/></g></svg>
      <span class="lab">Weft</span><span class="role">federation</span>
    </div>
    <span class="arrow">▸</span>
    <div class="members">
      <svg viewBox="0 0 32 32" fill="none" style="color:var(--thread-loomweave)"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5 V27"/><path d="M16 11 H24"/><path d="M16 21 H8"/></g><g fill="currentColor"><circle cx="16" cy="5" r="2.4"/><circle cx="24" cy="11" r="2.4"/><circle cx="8" cy="21" r="2.4"/><circle cx="16" cy="27" r="2.4"/></g></svg>
      <svg viewBox="0 0 32 32" fill="none" style="color:var(--thread-filigree)"><g stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M16 4 L28 16 L16 28 L4 16 Z"/><path d="M16 11 L21 16 L16 21 L11 16 Z" fill="currentColor" stroke="none"/></g></svg>
      <svg viewBox="0 0 32 32" fill="none" style="color:var(--thread-wardline)"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 4 V28"/><path d="M6 10 H15"/><path d="M6 16 H15"/><path d="M6 22 H15"/><path d="M18 16 L26 11 V21 L18 16Z" fill="currentColor"/></g></svg>
      <svg viewBox="0 0 32 32" fill="none" style="color:var(--thread-legis)"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 6 V25"/><path d="M9 25 H23"/><path d="M7 9 H25"/><path d="M7 9 L4 16 H10 L7 9Z"/><path d="M25 9 L22 16 H28 L25 9Z"/></g></svg>
      <svg viewBox="0 0 32 32" fill="none" style="color:var(--thread-charter)"><g stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5 H24 V27 H8 Z"/><path d="M12 11 H20"/><path d="M12 16 H17"/><path d="M11.5 21.5 L14 24 L20 17.5"/></g></svg>
      <span class="role">members</span>
    </div>
  </div>
</body></html>
