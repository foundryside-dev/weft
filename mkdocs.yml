# ============================================================================
# Loom Federation — hub documentation site (MkDocs Material).
#
# docs_dir is a BUILD-TIME MIRROR of the repo-root markdown, generated by
# scripts/build-docs.sh (which must run before `mkdocs build`). docs/ and site/
# are gitignored — the root markdown stays the single source of truth.
#
# Theme: the Loom design system mapped onto Material's own light/dark scheme
# selectors (see docs/stylesheets/loom-mkdocs.css). Material owns the toggle;
# there is no hand-rolled theme switch on doc pages. Dark (slate) is canonical.
# The custom landing (overrides/home.html) is the site HOME, chrome-free.
# ============================================================================
site_name: Loom Federation
site_description: >-
  Loom Federation is an agent-first family of small, local-first developer
  tools. Each member is authoritative for one domain, useful on its own, and
  enrich-only — never load-bearing — when composed.
site_url: https://foundryside-dev.github.io/loom/

repo_url: https://github.com/foundryside-dev/loom
repo_name: foundryside-dev/loom
edit_uri: edit/main/

docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: en
  # Dark (slate) is the CANONICAL DEFAULT; listed first so it is the initial scheme.
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  # Bundle fonts locally via loom-mkdocs.css @font-face; do NOT fetch Google Fonts.
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.action.view
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/loom-mkdocs.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# Internal links resolve as relative .md targets; keep mkdocs 1.6 defaults so
# "pages exist but are not in nav" stays INFO (does not fail --strict). Broken
# link targets and anchors remain WARNINGs, which --strict promotes to errors.
validation:
  omitted_files: info
  absolute_links: info
  unrecognized_links: warn
  anchors: warn

nav:
  - Home: README.md
  - Doctrine: doctrine.md
  - Federation:
      - Federation map: federation-map.md
      - Compatibility: compatibility.md
      - Asterisk register: asterisk-register.md
      - Contracts index: contracts-index.md
      - URI scheme: uri-scheme.md
  - Identity:
      - SEI standard: sei-standard.md
  - Members:
      - Clarion: members/clarion.md
      - Filigree: members/filigree.md
      - Wardline: members/wardline.md
      - Legis: members/legis.md
      - Charter: members/charter.md
      - Shuttle: members/shuttle.md
      - Lacuna (specimen): members/lacuna.md
  - Reference:
      - Glossary: glossary.md
      - Conflict register: conflict-register.md
  - Project:
      - Shipping: SHIPPING.md
      - Theming: THEMING.md
      - Roadmap ideas: roadmap-ideas.md
      - Manifest: MANIFEST.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/foundryside-dev/loom
